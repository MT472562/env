[general]
live_config_reload = true

[window]
opacity = 0.95
blur = true

[window.padding]
x = 15
y = 15

[window.dimensions]
columns = 170
lines = 45

[colors.primary]
background = '#0e101a'
foreground = '#c0caf5'

[colors.normal]
black =   '#1d202f'
red =     '#f7768e'
green =   '#9ece6a'
yellow =  '#e0af68'
blue =    '#7aa2f7'
magenta = '#bb9af7'
cyan =    '#7dcfff'
white =   '#a9b1d6'

[colors.bright]
black =   '#414868'
red =     '#f7768e'
green =   '#9ece6a'
yellow =  '#e0af68'
blue =    '#7aa2f7'
magenta = '#bb9af7'
cyan =    '#7dcfff'
white =   '#c0caf5'

[terminal.shell]
program = "wsl.exe"
args = ["~", "tmux"]

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "Enter"
mods = "Alt"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Equals"
mods = "Control"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "Minus"
mods = "Control"

[selection]
save_to_clipboard = true

[[mouse.bindings]]
mouse = "Right"
action = "Paste"




[font]
size = 12.0
builtin_box_drawing = false

[font.normal]
family = "PlemolJP Console NF"
style = "Regular"

[font.bold]
family = "PlemolJP Console NF"
style = "Bold"
