# --- 基本設定 ---

# マウス有効化
set -g mouse on

# Windowsクリップボードとの連携 (clip.exe)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"

# Escの遅延を解消
set -s escape-time 0

# 256色 / True Color 対応
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# --- 外観設定 ---
# ステータスバーを透明に
set -g status-style bg=default
set -g status-fg "#c0caf5"

# 更新間隔を1秒に
set -g status-interval 1

# 番号を1から開始
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ステータスバー（左）: セッション名
set -g status-left-length 20
set -g status-left "#[fg=#7aa2f7,bold] #S "

# ステータスバー（右）: CPU使用率 + メモリ使用率 + 日時
set -g status-right "#[fg=#7aa2f7] CPU: #{cpu_percentage} #[fg=#9ece6a] MEM: #{ram_percentage} #[fg=#c0caf5]| %Y-%m-%d %H:%M "

# ウィンドウリストのデザイン
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#15161e,bg=#7aa2f7,bold] #I:#W "

# --- 操作・キーバインド ---
# 設定リロード
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Vim風ペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + 矢印キーでリサイズ
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

# --- プラグイン設定 (tpm) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'

# tpmの初期化 (必ず最下部に置く)
run '~/.tmux/plugins/tpm/tpm'