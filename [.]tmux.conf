# --- 基本設定 ---
set -g mouse on
set -s escape-time 0
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# 番号管理
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-interval 1

# --- 外観設定 (Tokyo Night Theme) ---
set -g status-position top
set -g status-style bg=default,fg="#c0caf5"

# 左側: セッション名 (区切り記号を使用)
set -g status-left-length 30
set -g status-left "#[fg=#15161e,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=default]"

# 中央: ウィンドウリスト
setw -g window-status-format "#[fg=#565f89,bg=default]  #I:#W  "
setw -g window-status-current-format "#[fg=#7aa2f7,bg=#3b4261,bold] #[fg=#7aa2f7]#I:#W #[fg=#3b4261,bg=default]"

# 右側: CPU / RAM / Clock
set -g status-right-length 100
set -g status-right "#[fg=#414868]#[fg=#7aa2f7,bg=#414868]  #{cpu_percentage} #[fg=#414868,bg=#414868]#[fg=#9ece6a]  #{ram_percentage} #[fg=#7aa2f7,bg=#414868]#[fg=#15161e,bg=#7aa2f7,bold] %H:%M "

# --- 操作・キーバインド ---
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Vim風ペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + 矢印キーでリサイズ
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

# --- プラグイン設定 (tpm) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'

run '~/.tmux/plugins/tpm/tpm'
